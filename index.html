<!DOCTYPE html>
<html>
<head>
    <title>Radhak Portfolio</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f0f8ff; /* light blue background */
            color: #0b1d51;      /* dark blue text */
        }

        header {
            background: #1e3a8a;   /* deep blue header */
            color: white;
            padding: 20px;
            text-align: center;
        }

        section {
            padding: 20px;
            margin: 20px;
            background: #ffffff;   /* white cards */
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: #1e3a8a; /* heading in deep blue */
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #1e3a8a;
            display: block;
            margin: 10px auto;
        }

        .card {
            background: #e0f0ff;  /* very light blue */
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #1e3a8a;
        }

        button {
            background: #1e3a8a;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        button:hover {
            background: #3b5998; /* slightly lighter blue on hover */
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .contact-form input,
        .contact-form textarea {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #1e3a8a;
            background: #f0f8ff;
            color: #0b1d51;
        }

        .contact-form textarea {
            height: 100px;
        }
    </style>
</head>

<body>

<header>
    <h1>Radhak Nadh PS</h1>
    <p>BCA Student</p>
</header>



<section id="about">
    <h2>About</h2>
    <div class="card">
        <p>I am a BCA student passionate about technology and web development.</p>
    </div>
</section>

<section id="skills">
    <h2>Skills</h2>
    <div class="card">
        <p>HTML, CSS, JavaScript, Python</p>
    </div>
</section>

<section id="projects">
    <h2>Projects</h2>
    <div class="card">
        <p>Portfolio Website</p>
    </div>
</section>

<section id="contact">
    <h2>Contact</h2>
    <form class="contact-form" action="http://localhost:3000/contact" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message" required></textarea>
        <button type="submit">Send</button>
    </form>
</section>

</body>
</html>
